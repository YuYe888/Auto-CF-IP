name: 自动获取CF优选IP并查询中文归属地

on:
  schedule:
    - cron: '0 20 * * *' # 每天北京时间凌晨4点自动运行
  workflow_dispatch: # 允许你在网页上直接点按钮运行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 下载测速工具
        run: |
          wget https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -zxf CloudflareST_linux_amd64.tar.gz
          chmod +x CloudflareST

      - name: 开始测速并筛选
        run: |
          # 找出延迟低于200ms，速度大于5MB/s的前30个IP
          ./CloudflareST -tl 200 -sl 5 -dn 30 -o result.csv

      - name: 查询归属地并转换格式
        run: |
          echo "" > ips.txt
          # 读取测速结果，跳过表头，提取前30个IP
          tail -n +2 result.csv | head -n 30 | while IFS=, read -r ip sent recv loss ping speed rest; do
            # 调用API查询IP归属，lang=zh-CN指定中文，并提取"国家代码+中文国家名" (例如 US美国)
            loc=$(curl -s -m 2 "http://ip-api.com/json/$ip?lang=zh-CN" | jq -r 'if .status == "success" then .countryCode + .country else "未知地区" end')
            
            # 为了防止查得太快被封禁，每次查完休息1秒
            sleep 1
            
            # 拼接成最终格式，例如： 104.16.x.x:443#US美国_延迟150ms
            printf "%s:443#%s_延迟%sms\n" "$ip" "$loc" "$ping" >> ips.txt
          done

      - name: 保存测速结果到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ips.txt result.csv
          git commit -m "更新优选IP与中文归属地" || exit 0
          git push
